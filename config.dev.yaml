# Local development configuration
server:
  http_port: 8080
  grpc_port: 9090
  metrics_port: 9091
  shutdown_timeout: 30s

scheduler:
  node_id: local-node-1
  worker_pool_size: 10
  task_poll_interval: 5
  heartbeat_interval: 10
  heartbeat_timeout: 30
  lock_type: redis

database:
  type: mysql
  host: localhost
  port: 3306
  database: task_scheduler
  username: root
  password: 123456
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

etcd:
  endpoints:
    - localhost:2379
  username: ""
  password: ""
  timeout: 5s

discovery:
  type: static

notification:
  email:
    enabled: false
    smtp_host: smtp.gmail.com
    smtp_port: 587
    username: ""
    password: ""
    from: ""
  webhook:
    enabled: false
    url: ""
    timeout: 10s
  sms:
    enabled: false
    api_key: ""
    from: ""

log:
  level: info
  format: console
  output: stdout

metrics:
  enabled: true
  path: /metrics
