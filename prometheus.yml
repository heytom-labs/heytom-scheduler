global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'task-scheduler-dev'

scrape_configs:
  - job_name: 'task-scheduler'
    static_configs:
      - targets:
          - 'task-scheduler-1:9091'
          - 'task-scheduler-2:9091'
        labels:
          service: 'task-scheduler'
    
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
