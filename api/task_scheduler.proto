syntax = "proto3";

package taskscheduler;

option go_package = "task-scheduler/api/pb";

// TaskSchedulerService defines the gRPC service for task scheduling
service TaskSchedulerService {
  // CreateTask creates a new task
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  
  // GetTask retrieves a task by ID
  rpc GetTask(GetTaskRequest) returns (GetTaskResponse);
  
  // ListTasks retrieves tasks matching the filter
  rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
  
  // CancelTask cancels a task
  rpc CancelTask(CancelTaskRequest) returns (CancelTaskResponse);
  
  // GetTaskStatus retrieves the status of a task
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);
}

// ExecutionMode defines how a task should be executed
enum ExecutionMode {
  EXECUTION_MODE_UNSPECIFIED = 0;
  EXECUTION_MODE_IMMEDIATE = 1;  // 立即执行
  EXECUTION_MODE_SCHEDULED = 2;  // 定时执行
  EXECUTION_MODE_INTERVAL = 3;   // 固定间隔
  EXECUTION_MODE_CRON = 4;       // Cron表达式
}

// TaskStatus represents the current state of a task
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;    // 等待中
  TASK_STATUS_RUNNING = 2;    // 执行中
  TASK_STATUS_SUCCESS = 3;    // 成功
  TASK_STATUS_FAILED = 4;     // 失败
  TASK_STATUS_CANCELLED = 5;  // 已取消
}

// CallbackProtocol defines the callback protocol type
enum CallbackProtocol {
  CALLBACK_PROTOCOL_UNSPECIFIED = 0;
  CALLBACK_PROTOCOL_HTTP = 1;  // HTTP协议
  CALLBACK_PROTOCOL_GRPC = 2;  // gRPC协议
}

// ServiceDiscoveryType defines the service discovery mechanism
enum ServiceDiscoveryType {
  SERVICE_DISCOVERY_TYPE_UNSPECIFIED = 0;
  SERVICE_DISCOVERY_TYPE_STATIC = 1;      // 静态地址
  SERVICE_DISCOVERY_TYPE_CONSUL = 2;      // Consul
  SERVICE_DISCOVERY_TYPE_ETCD = 3;        // Etcd
  SERVICE_DISCOVERY_TYPE_KUBERNETES = 4;  // Kubernetes
}

// ChannelType defines notification channel types
enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_EMAIL = 1;    // 邮件
  CHANNEL_TYPE_WEBHOOK = 2;  // Webhook
  CHANNEL_TYPE_SMS = 3;      // 短信
}

// ScheduleConfig contains scheduling parameters
message ScheduleConfig {
  int64 scheduled_time = 1;       // 定时执行时间（Unix时间戳，秒）
  int64 interval_seconds = 2;     // 间隔时长（秒）
  string cron_expr = 3;           // Cron表达式
}

// CallbackConfig contains callback parameters
message CallbackConfig {
  CallbackProtocol protocol = 1;              // 回调协议类型
  string url = 2;                             // 回调URL（HTTP）或地址（gRPC）
  string method = 3;                          // HTTP方法（仅HTTP使用）
  string grpc_service = 4;                    // gRPC服务名（仅gRPC使用）
  string grpc_method = 5;                     // gRPC方法名（仅gRPC使用）
  map<string, string> headers = 6;            // 请求头（HTTP）或元数据（gRPC）
  int64 timeout_seconds = 7;                  // 超时时间（秒）
  bool is_async = 8;                          // 是否异步
  string service_name = 9;                    // 服务名（用于服务发现）
  ServiceDiscoveryType discovery_type = 10;   // 服务发现类型
}

// RetryPolicy defines retry behavior for failed tasks
message RetryPolicy {
  int32 max_retries = 1;          // 最大重试次数（0表示不重试）
  int64 retry_interval_seconds = 2;  // 重试间隔（秒）
  double backoff_factor = 3;      // 退避因子（指数退避）
}

// NotificationChannel represents a notification delivery method
message NotificationChannel {
  ChannelType type = 1;           // 渠道类型
  map<string, string> config = 2; // 渠道配置
}

// AlertPolicy defines alerting rules
message AlertPolicy {
  bool enable_failure_alert = 1;           // 启用失败报警
  int32 retry_threshold = 2;               // 重试次数阈值
  int64 timeout_threshold_seconds = 3;     // 超时阈值（秒）
  repeated NotificationChannel channels = 4; // 通知渠道
}

// Task represents a schedulable work unit
message Task {
  string id = 1;                              // 任务唯一标识
  string name = 2;                            // 任务名称
  string description = 3;                     // 任务描述
  string parent_id = 4;                       // 父任务ID（子任务时非空）
  ExecutionMode execution_mode = 5;           // 执行模式
  ScheduleConfig schedule_config = 6;         // 调度配置
  CallbackConfig callback_config = 7;         // 回调配置
  RetryPolicy retry_policy = 8;               // 重试策略
  int32 concurrency_limit = 9;                // 子任务并发限制
  AlertPolicy alert_policy = 10;              // 报警策略
  TaskStatus status = 11;                     // 任务状态
  int32 retry_count = 12;                     // 已重试次数
  string node_id = 13;                        // 执行节点ID
  int64 created_at = 14;                      // 创建时间（Unix时间戳，秒）
  int64 updated_at = 15;                      // 更新时间（Unix时间戳，秒）
  int64 started_at = 16;                      // 开始执行时间（Unix时间戳，秒）
  int64 completed_at = 17;                    // 完成时间（Unix时间戳，秒）
  map<string, string> metadata = 18;          // 元数据
}

// CreateTaskRequest contains parameters for creating a task
message CreateTaskRequest {
  string name = 1;                            // 任务名称
  string description = 2;                     // 任务描述
  string parent_id = 3;                       // 父任务ID（子任务时非空）
  ExecutionMode execution_mode = 4;           // 执行模式
  ScheduleConfig schedule_config = 5;         // 调度配置
  CallbackConfig callback_config = 6;         // 回调配置
  RetryPolicy retry_policy = 7;               // 重试策略
  int32 concurrency_limit = 8;                // 子任务并发限制
  AlertPolicy alert_policy = 9;               // 报警策略
  map<string, string> metadata = 10;          // 元数据
}

// CreateTaskResponse contains the created task
message CreateTaskResponse {
  Task task = 1;  // 创建的任务
}

// GetTaskRequest contains parameters for retrieving a task
message GetTaskRequest {
  string task_id = 1;  // 任务ID
}

// GetTaskResponse contains the retrieved task
message GetTaskResponse {
  Task task = 1;  // 任务信息
}

// ListTasksRequest contains parameters for listing tasks
message ListTasksRequest {
  TaskStatus status = 1;     // 按状态筛选
  string parent_id = 2;      // 按父任务ID筛选
  string node_id = 3;        // 按节点ID筛选
  int32 limit = 4;           // 限制返回数量
  int32 offset = 5;          // 偏移量
}

// ListTasksResponse contains the list of tasks
message ListTasksResponse {
  repeated Task tasks = 1;  // 任务列表
  int32 count = 2;          // 任务数量
}

// CancelTaskRequest contains parameters for cancelling a task
message CancelTaskRequest {
  string task_id = 1;  // 任务ID
}

// CancelTaskResponse contains the result of cancelling a task
message CancelTaskResponse {
  string message = 1;  // 响应消息
  string task_id = 2;  // 任务ID
}

// GetTaskStatusRequest contains parameters for retrieving task status
message GetTaskStatusRequest {
  string task_id = 1;  // 任务ID
}

// GetTaskStatusResponse contains the task status information
message GetTaskStatusResponse {
  string task_id = 1;                         // 任务ID
  TaskStatus status = 2;                      // 任务状态
  int32 retry_count = 3;                      // 已重试次数
  int64 created_at = 4;                       // 创建时间（Unix时间戳，秒）
  int64 updated_at = 5;                       // 更新时间（Unix时间戳，秒）
  int64 started_at = 6;                       // 开始执行时间（Unix时间戳，秒）
  int64 completed_at = 7;                     // 完成时间（Unix时间戳，秒）
}
