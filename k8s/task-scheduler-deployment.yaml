apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-scheduler
  namespace: task-scheduler
  labels:
    app: task-scheduler
spec:
  replicas: 3
  selector:
    matchLabels:
      app: task-scheduler
  template:
    metadata:
      labels:
        app: task-scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: task-scheduler
      containers:
      - name: task-scheduler
        image: task-scheduler:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: task-scheduler-secrets
              key: db-password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: task-scheduler-secrets
              key: redis-password
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        - containerPort: 9090
          name: grpc
          protocol: TCP
        - containerPort: 9091
          name: metrics
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: task-scheduler-config
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - task-scheduler
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-http
  namespace: task-scheduler
  labels:
    app: task-scheduler
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http

---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-grpc
  namespace: task-scheduler
  labels:
    app: task-scheduler
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: grpc

---
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-metrics
  namespace: task-scheduler
  labels:
    app: task-scheduler
spec:
  type: ClusterIP
  selector:
    app: task-scheduler
  ports:
  - port: 9091
    targetPort: 9091
    protocol: TCP
    name: metrics

---
# Headless service for pod discovery
apiVersion: v1
kind: Service
metadata:
  name: task-scheduler-headless
  namespace: task-scheduler
  labels:
    app: task-scheduler
spec:
  clusterIP: None
  selector:
    app: task-scheduler
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: grpc
