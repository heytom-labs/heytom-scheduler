apiVersion: v1
kind: Secret
metadata:
  name: task-scheduler-secrets
  namespace: task-scheduler
type: Opaque
stringData:
  # Database credentials
  db-password: "changeme-scheduler-password"
  db-root-password: "changeme-root-password"
  
  # Redis password
  redis-password: "changeme-redis-password"
  
  # Note: In production, use external secret management like:
  # - Kubernetes Secrets with encryption at rest
  # - HashiCorp Vault
  # - AWS Secrets Manager
  # - Azure Key Vault
  # - Google Secret Manager
