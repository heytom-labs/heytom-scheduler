apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-scheduler-ingress
  namespace: task-scheduler
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - task-scheduler.example.com
    secretName: task-scheduler-tls
  rules:
  - host: task-scheduler.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: task-scheduler-http
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-ui
            port:
              number: 80

---
# gRPC Ingress (requires gRPC support in ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-scheduler-grpc-ingress
  namespace: task-scheduler
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - grpc.task-scheduler.example.com
    secretName: task-scheduler-grpc-tls
  rules:
  - host: grpc.task-scheduler.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: task-scheduler-grpc
            port:
              number: 9090
