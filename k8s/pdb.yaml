apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: task-scheduler-pdb
  namespace: task-scheduler
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: task-scheduler

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: admin-ui-pdb
  namespace: task-scheduler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: admin-ui
